<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign In</title>
</head>
<body>
    <header id="header"></header>
    <div class="mockup-hr"></div>
    <fieldset>
        <main>
            <form action="home.html">
                <h2>Login</h2>
                <label for="">Enter your email</label><br>
                <input type="email" placeholder="eg: JohnDoe01@mail.org" required><br>
                <label for="">Enter your password</label><br>
                <input type="password" minlength="8" required><br>
                <br><br>
                <button type="submit">Login</button><br><br>
                <button type="reset">Cancel</button>
            </form>
        </main>
    </fieldset>
    <footer id="footer"></footer>
        <script>
    // Funktion zum Laden des Headers
    fetch('header.html')                                                    // Die 'fetch' Funktion wird verwendet, um die header.html Datei zu laden.
        .then(response => response.text())                                  // Die Antwort der 'fetch' Anfrage wird in diesem Schritt überprüft.
                                                                            // 'response.text()' gibt den Textinhalt der Datei (header.html) zurück.
        .then(data => {                                                     // Wenn die Datei erfolgreich geladen und der Inhalt in der 'data' Variable gespeichert wurde,
                                                                            // wird der Inhalt in das <div> mit der ID 'header' eingefügt.
            document.getElementById('header').innerHTML = data;
        })
        .catch(error => console.error('Error loading header:', error));
    fetch('footer.html')                                                
        .then(response => response.text())                                           
        .then(data => {document.getElementById('footer').innerHTML = data;})
        .catch(error => console.error('Error loading footer:', error)); 
    </script>
</body>
</html>
