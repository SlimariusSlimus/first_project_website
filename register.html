<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="scripts.js" defer></script>
    <title>Sign Up</title>
</head>
<body>
    <header id="header"></header>
    <main>
        <fieldset>
            <form action="login.html">
                <h2>Register</h2>
                <label for="">Enter username</label><br>
                <input type="text" placeholder="eg: JohnDoe01" required><br>
                <label for="">Enter password</label><br>
                <input type="password" placeholder="min. 8 characters" minlength="8" required><br>
                <label for="">Email</label><br>
                <input type="email" placeholder="Email: eg: JohnDoe01" required><br>
                <label for="">Enter date of birth</label><br>
                <input type="date" required><br>
                <label for="">Profile picture</label><br>
                <input type="file" accept="image/"><br>
                <br><br>
                <button type="submit">Register</button><br><br>
                <button type="reset">Cancel</button>
            </form>
        </fieldset>
    </main>
    <footer id="footer"></footer>
</body>
</html>
