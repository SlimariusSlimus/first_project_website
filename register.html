<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sign Up</title>
</head>
<body>
    <header id="header"></header>
    <main>
        <fieldset>
            <form action="login.html">
                <h2>Register</h2>
                <label for="">Enter username</label><br>
                <input type="text" placeholder="eg: JohnDoe01" required><br>
                <label for="">Enter password</label><br>
                <input type="password" placeholder="min. 8 characters" minlength="8" required><br>
                <label for="">Email</label><br>
                <input type="email" placeholder="Email: eg: JohnDoe01" required><br>
                <label for="">Enter date of birth</label><br>
                <input type="date" required><br>
                <label for="">Profile picture</label><br>
                <input type="file" accept="image/"><br>
                <br><br>
                <button type="submit">Register</button><br><br>
                <button type="reset">Cancel</button>
            </form>
        </fieldset>
    </main>
    <footer id="footer"></footer>
        <script>
    // Funktion zum Laden des Headers
    fetch('header.html')                                                    // Die 'fetch' Funktion wird verwendet, um die header.html Datei zu laden.
        .then(response => response.text())                                  // Die Antwort der 'fetch' Anfrage wird in diesem Schritt überprüft.
                                                                            // 'response.text()' gibt den Textinhalt der Datei (header.html) zurück.
        .then(data => {                                                     // Wenn die Datei erfolgreich geladen und der Inhalt in der 'data' Variable gespeichert wurde,
                                                                            // wird der Inhalt in das <div> mit der ID 'header' eingefügt.
            document.getElementById('header').innerHTML = data;
        })
        .catch(error => console.error('Error loading header:', error));
    fetch('footer.html')                                                
        .then(response => response.text())                                           
        .then(data => {document.getElementById('footer').innerHTML = data;})
        .catch(error => console.error('Error loading footer:', error)); 
    </script>
</body>
</html>
