<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contact</title>
</head>
<body>
    <header id="header"></header>
    <main>
        <section>
            <h2>Contact Sloths</h2>
            <form action="" method="post">                                      <!--TODO setup mailing to me--> 
                <label for="name">Your Name</label><br>
                <input type="text" id="name" name="name" required><br>

                <label for="email">Your Email</label><br>
                <input type="email" name="email" required><br>

                <label for="subject">Subject</label><br>
                <input type="text" name="subject"><br>

                <label for="message">Message</label><br>
 
                <textarea name="message" ></textarea><br>

                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    <footer id="footer">
    </footer>
    <script>
    // Funktion zum Laden des Headers
    fetch('header.html')                                                    // Die 'fetch' Funktion wird verwendet, um die header.html Datei zu laden.
        .then(response => response.text())                                  // Die Antwort der 'fetch' Anfrage wird in diesem Schritt überprüft.
                                                                            // 'response.text()' gibt den Textinhalt der Datei (header.html) zurück.
        .then(data => {                                                     // Wenn die Datei erfolgreich geladen und der Inhalt in der 'data' Variable gespeichert wurde,
                                                                            // wird der Inhalt in das <div> mit der ID 'header' eingefügt.
            document.getElementById('header').innerHTML = data;
        })
        .catch(error => console.error('Error loading header:', error));
    fetch('footer.html')                                                
        .then(response => response.text())                                           
        .then(data => {document.getElementById('footer').innerHTML = data;})
        .catch(error => console.error('Error loading footer:', error)); 
    </script>
</body>
</html>
